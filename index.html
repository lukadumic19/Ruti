*{box-sizing:border-box;margin:0;padding:0}

  --rt-header:#FF6B6B;--rt-header-text:#fff;

  --rt-del-bg:#fee;--rt-del-text:#e74c3c;

}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--rt-bg);overscroll-behavior:none;transition:background 0.4s}
@keyframes ruti_brush{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes ruti_bubble{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-18px) scale(0.4)}}
@keyframes ruti_drop{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(8px)}}
@keyframes ruti_steam{0%,100%{transform:translateY(0);opacity:0.55}50%{transform:translateY(-9px);opacity:0.15}}
@keyframes ruti_bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ruti_shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes ruti_write{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,3px)}}
@keyframes ruti_star{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.25;transform:scale(0.6)}}
@keyframes ruti_zzz{0%{transform:translate(0,0);opacity:1}100%{transform:translate(12px,-16px);opacity:0}}
@keyframes ruti_sweep{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
@keyframes ruti_note{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(8deg)}}
@keyframes ruti_sun{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ruti_confetti{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes ruti_fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes ruti_pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ruti_themeIn{0%{opacity:0;transform:scale(0.97)}100%{opacity:1;transform:scale(1)}}
@keyframes ruti_glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
@keyframes ruti_now{0%,100%{box-shadow:0 0 0 0 var(--now-color,#FF6B6B)}50%{box-shadow:0 0 0 8px transparent}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY='rutine2:data';
const stor={
  get:()=>{try{if(window.storage&&window.storage.get){const v=window.storage.get(STORAGE_KEY);return v?(typeof v==='string'?JSON.parse(v):v):null;}const v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):null;}catch{return null;}},
  set:(d)=>{try{const s=JSON.stringify(d);if(window.storage&&window.storage.set){window.storage.set(STORAGE_KEY,s);}else{localStorage.setItem(STORAGE_KEY,s);}}catch{}}
};

const migrateChild=(c)=>{
  if(c.schedule)return c;
  const schedule=[...(c.routines?.morning||[]),...(c.routines?.afternoon||[]),...(c.routines?.evening||[])].map(t=>({id:t.id||uuid(),text:t.text,illustration:t.illustration||'homework',time:null,pointValue:t.pointValue||5,done:t.done||false}));
  const{routines,...rest}=c;
  return{...rest,schedule,showTimes:false};
};

function PinPad({mode='verify',storedPin,onVerify,onSet}){
  const [digits,setDigits]=useState('');const [confirm,setConfirm]=useState('');const [step,setStep]=useState(1);const [err,setErr]=useState('');
  const press=(d)=>{setErr('');if(d==='del'){step===1?setDigits(p=>p.slice(0,-1)):setConfirm(p=>p.slice(0,-1));return;}if(step===1&&digits.length>=4)return;if(step===2&&confirm.length>=4)return;if(step===1){const next=digits+d;setDigits(next);if(next.length===4){if(mode==='verify'){if(next===storedPin){setTimeout(()=>onVerify(),200);}else{setTimeout(()=>{setErr('Forkert PIN — prøv igen');setDigits('');},300);}}else{setStep(2);}}}else{const next=confirm+d;setConfirm(next);if(next.length===4){if(next===digits){setTimeout(()=>onSet(next),200);}else{setTimeout(()=>{setErr('PIN-koderne matcher ikke');setDigits('');setConfirm('');setStep(1);},300);}}}};
  const cur=step===1?digits:confirm;const prompt=mode==='verify'?'Indtast PIN-kode':step===1?'Vælg ny PIN-kode':'Bekræft ny PIN-kode';
  return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:18,padding:'10px 0'}}><p style={{fontSize:16,fontWeight:600,color:'var(--rt-text)'}}>{prompt}</p><div style={{display:'flex',gap:14}}>{[0,1,2,3].map(i=>(<div key={i} style={{width:18,height:18,borderRadius:'50%',background:cur.length>i?'var(--rt-pin-dot-fill)':'var(--rt-pin-dot)',transition:'background 0.15s'}}/>))}</div>{err&&<p style={{color:'var(--rt-del-text)',fontSize:13}}>{err}</p>}<div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:10}}>{[1,2,3,4,5,6,7,8,9].map(d=>(<button key={d} onClick={()=>press(String(d))} style={{...s.btn,width:72,height:72,fontSize:26,fontWeight:700,background:'var(--rt-pin-btn)',border:'2px solid var(--rt-pin-btn-border)',borderRadius:16,color:'var(--rt-text)'}}>{d}</button>))}<div/><button onClick={()=>press('0')} style={{...s.btn,width:72,height:72,fontSize:26,fontWeight:700,background:'var(--rt-pin-btn)',border:'2px solid var(--rt-pin-btn-border)',borderRadius:16,color:'var(--rt-text)'}}>0</button><button onClick={()=>press('del')} style={{...s.btn,width:72,height:72,fontSize:22,background:'var(--rt-pin-btn)',border:'2px solid var(--rt-pin-btn-border)',borderRadius:16,color:'var(--rt-del-text)'}}>⌫</button></div></div>);
}

function Confetti(){
  const pieces=Array.from({length:65},(_,i)=>({id:i,x:Math.random()*100,color:['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#FD79A8','#00B894','#FDCB6E'][i%7],delay:Math.random()*2,dur:2+Math.random()*2.5,size:5+Math.random()*9,shape:Math.random()>0.4?'rect':'circle'}));

function ProgressBar({value,max,color='var(--rt-primary)',height=10}){
  const pct=max>0?Math.min(100,Math.round(value/max*100)):0;
  return(<div style={{background:'var(--rt-progress-bg)',borderRadius:height,height,overflow:'hidden',width:'100%'}}><div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:height,transition:'width 0.5s ease'}}/></div>);
}

function WeeklyChart({child}){
  const DAY=['Man','Tir','Ons','Tor','Fre','Lør','Søn'];const t=new Date();
  const week=Array.from({length:7},(_,i)=>{const d=new Date(t);d.setDate(t.getDate()-6+i);const key=d.toISOString().slice(0,10);const h=child.history.find(x=>x.date===key);const dow=d.getDay();return{label:DAY[dow===0?6:dow-1],pts:h?h.points:0,isToday:key===today()};});
  const maxPts=Math.max(...week.map(w=>w.pts),1);
  return(<div style={{display:'flex',alignItems:'flex-end',gap:6,height:130,padding:'0 4px'}}>{week.map((w,i)=>(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,height:'100%',justifyContent:'flex-end'}}><span style={{fontSize:10,color:w.isToday?child.color:'var(--rt-faint)',fontWeight:w.isToday?700:400}}>{w.pts>0?w.pts:''}</span><div style={{width:'100%',background:w.isToday?child.color:'var(--rt-progress-bg)',borderRadius:'6px 6px 0 0',height:`${Math.round(w.pts/maxPts*90)}px`,minHeight:w.pts>0?4:2,transition:'height 0.6s ease'}}/><span style={{fontSize:11,color:w.isToday?child.color:'var(--rt-muted)',fontWeight:w.isToday?700:400}}>{w.label}</span></div>))}</div>);
}

// ── RutineApp ─────────────────────────────────────────────────────────────────
function RutineApp(){
  const [data,setData]=useState(()=>{const raw=stor.get();if(!raw)return defaultData();return{...raw,children:(raw.children||[]).map(migrateChild)};});
  const [view,setView]=useState('home');
  const [childId,setChildId]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const [unlocked,setUnlocked]=useState(false);
  const [mAddChild,setMAddChild]=useState(false);
  const [mEditChild,setMEditChild]=useState(null);
  const [mSchedule,setMSchedule]=useState(null); // child id for schedule editor
  const [mAddReward,setMAddReward]=useState(false);
  const [mEditReward,setMEditReward]=useState(null);
  const [mChangePin,setMChangePin]=useState(false);
  const [mTheme,setMTheme]=useState(false);

  useEffect(()=>{stor.set(data);},[data]);

  const child=data.children.find(c=>c.id===childId)||null;
  const activeThemeId=(['child','shop'].includes(view)&&child)?(child.theme||'natur'):'natur';
  useEffect(()=>{applyTheme(THEMES[activeThemeId]||THEMES.natur);},[activeThemeId]);

  // Midnight reset
  useEffect(()=>{
    const check=()=>{const t=today();if(data.lastReset!==t){setData(prev=>{const children=prev.children.map(c=>{const earned=Object.values(c.schedule||[]).flat().filter(x=>x.done).reduce((a,x)=>a+(x.pointValue||5),0);const hist=earned>0?[...c.history.slice(-29),{date:prev.lastReset,points:earned}]:c.history;const schedule=(c.schedule||[]).map(x=>({...x,done:false}));return{...c,schedule,history:hist};});return{...prev,children,lastReset:t};});}};
    check();const iv=setInterval(check,60000);return()=>clearInterval(iv);
  },[data.lastReset]);

  const upd=(fn)=>setData(prev=>fn(prev));

  const toggleTask=(cid,tid)=>{
    upd(prev=>({...prev,children:prev.children.map(c=>{
      if(c.id!==cid)return c;
      const schedule=(c.schedule||[]).map(t=>t.id===tid?{...t,done:!t.done}:t);
      const toggled=schedule.find(t=>t.id===tid);
      const pts=toggled.pointValue||5;
      const newPts=Math.max(0,c.points+(toggled.done?pts:-pts));
      const newTotal=toggled.done?c.totalPoints+pts:Math.max(0,c.totalPoints-pts);
      if(schedule.every(t=>t.done))setTimeout(()=>setConfetti(true),200);
      return{...c,schedule,points:newPts,totalPoints:newTotal};
    })}));
  };

  useEffect(()=>{if(confetti){const t=setTimeout(()=>setConfetti(false),5000);return()=>clearTimeout(t);}},[confetti]);
  const buyReward=(cid,rid)=>{const r=data.rewards.find(x=>x.id===rid);if(!r)return;upd(prev=>({...prev,children:prev.children.map(c=>c.id===cid&&c.points>=r.cost?{...c,points:c.points-r.cost}:c)}));};
  const setChildTheme=(cid,tid)=>upd(p=>({...p,children:p.children.map(c=>c.id===cid?{...c,theme:tid}:c)}));

  // ── Home ────────────────────────────────────────────────────────────────────
  const Home=()=>(
    <div style={{padding:20}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:16}}>
        {data.children.map(c=>{
          const sched=c.schedule||[];const done=sched.filter(t=>t.done).length;const badge=getBadge(c.totalPoints);const th=THEMES[c.theme||'natur']||THEMES.natur;
          return(<div key={c.id} onClick={()=>{setChildId(c.id);setView('child');}} style={{...s.card,cursor:'pointer',textAlign:'center',padding:'22px 14px',borderTop:`5px solid ${c.color}`,animation:'ruti_pop 0.3s ease-out',background:th.card,boxShadow:th.cardShadow,borderRadius:th.cardRadius}}>
            <div style={{fontSize:50,lineHeight:1,marginBottom:8}}>{c.avatar}</div>
            <div style={{fontSize:17,fontWeight:700,color:th.text,marginBottom:2}}>{c.name}</div>
            <div style={{fontSize:12,color:th.muted,marginBottom:12}}>{badge.icon} {badge.label}</div>
            <ProgressBar value={done} max={sched.length} color={c.color} height={7}/>
            <div style={{fontSize:11,color:th.faint,marginTop:5}}>{done}/{sched.length} aktiviteter</div>
            <div style={{marginTop:8,fontSize:15,fontWeight:700,color:c.color}}>⭐ {c.points}</div>
            <div style={{marginTop:5,fontSize:11,color:th.muted}}>{th.emoji} {th.name}</div>
          </div>);
        })}
        {data.children.length===0&&(<div style={{gridColumn:'1/-1',textAlign:'center',padding:48,color:'var(--rt-muted)'}}><div style={{fontSize:52}}>👨‍👧</div><p style={{marginTop:12,lineHeight:1.6}}>Ingen børn endnu.<br/>Åbn forældremenuen for at tilføje.</p></div>)}
      </div>
    </div>
  );

  // ── Day schedule view ────────────────────────────────────────────────────────
  const ChildView=()=>{
    if(!child)return null;
    const schedule=child.schedule||[];
    const currentIdx=schedule.findIndex(t=>!t.done);
    const doneCount=schedule.filter(t=>t.done).length;
    const badge=getBadge(child.totalPoints);
    const allDone=currentIdx===-1&&schedule.length>0;
    return(
      <div style={{padding:'14px 14px 24px',animation:'ruti_themeIn 0.35s ease-out'}}>
        {/* Header */}
        <div style={{...s.card,marginBottom:16,padding:'16px 18px'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
            <div style={{fontSize:42}}>{child.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:18,fontWeight:700,color:child.color}}>{child.name}</div>
              <div style={{fontSize:12,color:'var(--rt-muted)'}}>{badge.icon} {badge.label} · ⭐ {child.points} point</div>
            </div>
            <button onClick={()=>setMTheme(true)} style={{...s.btn,padding:'8px 11px',background:'var(--rt-sep)',color:'var(--rt-text)',fontSize:18,borderRadius:12}}>🎨</button>
          </div>
          <ProgressBar value={doneCount} max={schedule.length} color={child.color}/>
          <div style={{fontSize:12,color:'var(--rt-muted)',marginTop:5}}>{doneCount} af {schedule.length} aktiviteter gennemført</div>
        </div>

        {/* All done celebration */}
        {allDone&&(<div style={{...s.card,textAlign:'center',padding:'36px 20px',border:`3px solid var(--rt-task-done)`,marginBottom:12}}><div style={{fontSize:64,marginBottom:12}}>🎉</div><div style={{fontSize:22,fontWeight:800,color:'var(--rt-task-done)'}}>Alle aktiviteter er klaret!</div><div style={{fontSize:15,color:'var(--rt-muted)',marginTop:8}}>Fantastisk arbejde i dag! ⭐</div></div>)}

        {/* Schedule */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {schedule.map((task,idx)=>{
            const isDone=task.done;
            const isCurrent=idx===currentIdx;

            /* Completed — compact */
            if(isDone) return(
              <div key={task.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'var(--rt-card)',borderRadius:'var(--rt-card-radius)',opacity:0.55,boxShadow:'none'}}>
                <div style={{position:'relative',flexShrink:0,width:50,height:50}}>
                  {IL[task.illustration]?IL[task.illustration](50):<div style={{width:50,height:50,background:'var(--rt-sep)',borderRadius:10}}/>}
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(78,205,196,0.88)',borderRadius:'50%',fontSize:22,color:'#fff',fontWeight:700}}>✓</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:600,color:'var(--rt-muted)',textDecoration:'line-through'}}>{task.text}</div>
                  {child.showTimes&&task.time&&<div style={{fontSize:11,color:'var(--rt-faint)'}}>⏰ {task.time}</div>}
                </div>
              </div>
            );

            /* Current — BIG */
            if(isCurrent) return(
              <div key={task.id} style={{...s.card,border:`4px solid ${child.color}`,padding:'28px 20px',textAlign:'center',boxShadow:`0 6px 28px ${child.color}44`,'--now-color':child.color}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:18}}>

                <div style={{flexShrink:0}}>{IL[task.illustration]?IL[task.illustration](60):<div style={{width:60,height:60,background:'var(--rt-sep)',borderRadius:14}}/>}</div>

  };

        {data.rewards.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--rt-muted)'}}><div style={{fontSize:36}}>🛍</div><p style={{marginTop:8}}>Ingen belønninger</p></div>}
      </div>
    </div>);
  };

  // ── Weekly ──────────────────────────────────────────────────────────────────
  const Weekly=()=>(<div style={{padding:20}}><div style={{display:'flex',flexDirection:'column',gap:16}}>{data.children.map(c=>(<div key={c.id} style={s.card}><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}><span style={{fontSize:32}}>{c.avatar}</span><div><div style={{fontWeight:700,fontSize:16,color:c.color}}>{c.name}</div><div style={{fontSize:12,color:'var(--rt-muted)'}}>{getBadge(c.totalPoints).icon} {c.totalPoints} point i alt</div></div></div><WeeklyChart child={c}/></div>))}{data.children.length===0&&<div style={{textAlign:'center',padding:48,color:'var(--rt-muted)'}}><div style={{fontSize:42}}>📊</div><p style={{marginTop:12}}>Ingen data endnu</p></div>}</div></div>);

  // ── Parent panel ─────────────────────────────────────────────────────────
  const Parent=()=>{
    if(!unlocked)return(
      <div style={{padding:'48px 20px',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{fontSize:56,marginBottom:12}}>🔒</div>

      </div>
    );
    return(
      <div style={{padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={s.h2}>Pædagog-panel</h2>
          <div style={{display:'flex',gap:8}}>

            <button onClick={()=>setUnlocked(false)} style={{...s.btn,padding:'7px 14px',fontSize:13,background:'var(--rt-sep)',color:'var(--rt-muted)',borderRadius:10}}>Lås</button>

                <div style={{display:'flex',gap:7}}>

                  <button onClick={()=>setMEditChild(c.id)} style={{...s.btn,flex:1,padding:'8px 0',fontSize:13,background:'var(--rt-sep)',color:'var(--rt-muted)',borderRadius:10}}>✏️ Rediger</button>

  // ── Schedule editor modal ──────────────────────────────────────────────────
  function ScheduleModal({cid,onClose}){
    const c=data.children.find(x=>x.id===cid);
    if(!c)return null;
    const schedule=c.schedule||[];
    const [dragSrc,setDragSrc]=useState(null);
    const [dragOver,setDragOver]=useState(null);
    const [showBank,setShowBank]=useState(false);
    const [editing,setEditing]=useState(null); // null | 'new' | task-obj

    const updSched=(ns)=>upd(p=>({...p,children:p.children.map(ch=>ch.id!==cid?ch:{...ch,schedule:ns})}));
    const move=(idx,dir)=>{const ni=idx+dir;if(ni<0||ni>=schedule.length)return;const a=[...schedule];[a[idx],a[ni]]=[a[ni],a[idx]];updSched(a);};
    const addFromBank=(preset)=>{updSched([...schedule,{id:uuid(),text:preset.text,illustration:preset.illustration,time:c.showTimes?(preset.defaultTime||null):null,pointValue:preset.pts||10,done:false}]);};
    const resetDay=()=>{if(window.confirm(`Nulstil dagens aktiviteter for ${c.name}?`))updSched(schedule.map(t=>({...t,done:false})));};

    /* Activity editor (shown inline when editing !== null) */
    if(editing!==null){
      const task=editing==='new'?null:editing;
      return <ActivityForm task={task} cid={cid} schedule={schedule} updSched={updSched} showTime={c.showTimes} onDone={()=>setEditing(null)} onClose={onClose}/>;
    }

    return(
      <Modal title={`${c.avatar} ${c.name} — Dagsplan`} onClose={onClose}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>

          {/* showTimes toggle */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'var(--rt-sep)',borderRadius:14}}>
            <div>
              <div style={{fontWeight:600,color:'var(--rt-text)',fontSize:14}}>⏰ Vis klokkeslæt</div>
              <div style={{fontSize:11,color:'var(--rt-muted)',marginTop:2}}>Barnet ser tidspunkter for hver aktivitet</div>
            </div>
            <Toggle on={c.showTimes||false} onToggle={()=>upd(p=>({...p,children:p.children.map(ch=>ch.id!==cid?ch:{...ch,showTimes:!ch.showTimes})}))}/>
          </div>

          {/* Activity list */}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {schedule.length===0&&<p style={{textAlign:'center',color:'var(--rt-muted)',padding:'16px 0',fontSize:14}}>Ingen aktiviteter — tilføj fra banken nedenfor</p>}
            {schedule.map((act,idx)=>(
              <div key={act.id}
                draggable
                onDragStart={()=>setDragSrc(idx)}
                onDragOver={e=>{e.preventDefault();setDragOver(idx);}}
                onDrop={e=>{e.preventDefault();if(dragSrc===null||dragSrc===idx){setDragSrc(null);setDragOver(null);return;}const a=[...schedule];const[m]=a.splice(dragSrc,1);a.splice(idx,0,m);updSched(a);setDragSrc(null);setDragOver(null);}}
                onDragEnd={()=>{setDragSrc(null);setDragOver(null);}}
                style={{display:'flex',alignItems:'center',gap:8,padding:'9px 10px',background:'var(--rt-card)',borderRadius:12,border:`2px solid ${dragOver===idx?'var(--rt-primary)':'transparent'}`,opacity:dragSrc===idx?0.45:1,transition:'opacity 0.15s'}}>
                <span style={{fontSize:18,color:'var(--rt-faint)',cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                <div style={{flexShrink:0}}>{IL[act.illustration]?IL[act.illustration](34):<div style={{width:34,height:34,background:'var(--rt-sep)',borderRadius:8}}/>}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--rt-text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{act.text}</div>
                  {act.time&&<div style={{fontSize:11,color:'var(--rt-muted)'}}>⏰ {act.time}</div>}
                </div>
                {act.done&&<span style={{fontSize:13,color:'var(--rt-task-done)',fontWeight:700,flexShrink:0}}>✓</span>}
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button onClick={()=>move(idx,-1)} disabled={idx===0} style={{...s.btn,padding:'4px 8px',fontSize:14,background:'var(--rt-sep)',color:idx===0?'var(--rt-faint)':'var(--rt-muted)',borderRadius:8,lineHeight:1}}>↑</button>
                  <button onClick={()=>move(idx,1)} disabled={idx===schedule.length-1} style={{...s.btn,padding:'4px 8px',fontSize:14,background:'var(--rt-sep)',color:idx===schedule.length-1?'var(--rt-faint)':'var(--rt-muted)',borderRadius:8,lineHeight:1}}>↓</button>
                  <button onClick={()=>setEditing(act)} style={{...s.btn,padding:'4px 10px',fontSize:13,background:'var(--rt-sep)',color:'var(--rt-muted)',borderRadius:8}}>✏️</button>
                  <button onClick={()=>updSched(schedule.filter(t=>t.id!==act.id))} style={{...s.btn,padding:'4px 10px',fontSize:13,background:'var(--rt-del-bg)',color:'var(--rt-del-text)',borderRadius:8}}>🗑</button>
                </div>
              </div>
            ))}
          </div>

          <button onClick={()=>setEditing('new')} style={{...s.btn,background:'var(--rt-primary)',color:'var(--rt-primary-text)',padding:'12px'}}>+ Tilføj ny aktivitet</button>

          {/* Activity bank */}
          <div>
            <button onClick={()=>setShowBank(b=>!b)} style={{...s.btn,width:'100%',background:'var(--rt-sep)',color:'var(--rt-text)',padding:'11px 16px',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center',borderRadius:12}}>
              <span>📚 Aktivitetsbank</span>
              <span style={{fontSize:12}}>{showBank?'▲':'▼'}</span>
            </button>
            {showBank&&(
              <div style={{marginTop:8,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
                {ACTIVITY_BANK.map(p=>(
                  <button key={p.text} onClick={()=>addFromBank(p)} style={{...s.btn,display:'flex',flexDirection:'column',alignItems:'center',gap:5,padding:'10px 6px',background:'var(--rt-card)',border:'2px solid var(--rt-input-border)',borderRadius:14,color:'var(--rt-text)',fontSize:12,lineHeight:1.3}}>
                    {IL[p.illustration]?IL[p.illustration](38):<div style={{width:38,height:38}}/>}
                    <span style={{textAlign:'center',fontSize:11}}>{p.text}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          <button onClick={resetDay} style={{...s.btn,background:'var(--rt-sep)',color:'var(--rt-muted)',border:'1px solid var(--rt-input-border)',padding:'10px'}}>🔄 Nulstil dagens aktiviteter</button>
        </div>
      </Modal>
    );
  }

  /* Inline activity editor used by ScheduleModal */
  function ActivityForm({task,cid,schedule,updSched,showTime,onDone,onClose}){
    const [text,setText]=useState(task?.text||'');
    const [illus,setIllus]=useState(task?.illustration||'morgensamling');
    const [time,setTime]=useState(task?.time||'');
    const [pts,setPts]=useState(task?.pointValue||10);
    const save=()=>{
      if(!text.trim())return;
      const item={id:task?.id||uuid(),text:text.trim(),illustration:illus,time:time||null,pointValue:Number(pts),done:task?.done||false};
      if(task){updSched(schedule.map(t=>t.id===task.id?item:t));}
      else{updSched([...schedule,item]);}
      onDone();
    };
    return(
      <Modal title={task?'Rediger aktivitet':'Ny aktivitet'} onClose={onClose}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <button onClick={onDone} style={{...s.btn,padding:'6px 14px',fontSize:13,background:'var(--rt-sep)',color:'var(--rt-muted)',borderRadius:10,alignSelf:'flex-start'}}>← Tilbage</button>
          <label style={s.label}>Aktivitetsnavn</label>
          <input style={s.input} value={text} onChange={e=>setText(e.target.value)} placeholder="f.eks. Udeleg" autoFocus/>
          <label style={s.label}>Klokkeslæt (valgfrit)</label>
          <input type="time" style={s.input} value={time} onChange={e=>setTime(e.target.value)}/>
          <label style={s.label}>Point-værdi</label>
          <div style={{display:'flex',gap:8}}>
            {[5,10,15,20].map(v=>(<button key={v} onClick={()=>setPts(v)} style={{...s.btn,flex:1,padding:'9px 0',fontSize:14,background:pts===v?'#FFB347':'var(--rt-sep)',color:pts===v?'#fff':'var(--rt-muted)',border:`2px solid ${pts===v?'#FFB347':'var(--rt-input-border)'}`,borderRadius:10}}>{v} ⭐</button>))}
          </div>
          <label style={s.label}>Illustration</label>
          <IllustrationPicker selected={illus} onSelect={setIllus}/>
          <button onClick={save} style={{...s.btn,background:'var(--rt-primary)',color:'var(--rt-primary-text)',padding:'13px',marginTop:4,fontSize:16}}>{task?'Gem ændringer':'Tilføj aktivitet'}</button>
        </div>
      </Modal>
    );
  }

  // ── Child modal ────────────────────────────────────────────────────────────
  function ChildModal({cid,onClose}){
    const ex=cid?data.children.find(c=>c.id===cid):null;
    const [name,setName]=useState(ex?.name||'');

      if(!name.trim())return;
      if(cid){upd(p=>({...p,children:p.children.map(c=>c.id===cid?{...c,name:name.trim(),avatar,color,theme}:c)}));}
      else{upd(p=>({...p,children:[...p.children,{id:uuid(),name:name.trim(),avatar,color,theme,showTimes:true,points:0,totalPoints:0,schedule:[],history:[]}]}));}

      <Modal title={cid?'Rediger barn':'Tilføj barn'} onClose={onClose} narrow>

          <label style={s.label}>Avatar</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {CHILD_AVATARS.map(a=>(<button key={a} onClick={()=>setAvatar(a)} style={{fontSize:26,padding:8,borderRadius:10,border:`2px solid ${avatar===a?'var(--rt-primary)':'var(--rt-input-border)'}`,background:avatar===a?'var(--rt-sep)':'var(--rt-card)',cursor:'pointer',touchAction:'manipulation',color:'inherit'}}>{a}</button>))}
          </div>
          <label style={s.label}>Farve</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {CHILD_COLORS.map(c=>(<div key={c} onClick={()=>setColor(c)} style={{width:30,height:30,borderRadius:'50%',background:c,cursor:'pointer',border:`3px solid ${color===c?'var(--rt-text)':'transparent'}`,transition:'border 0.15s'}}/>))}
          </div>
          <label style={s.label}>Tema</label>

  // ── Reward modal ───────────────────────────────────────────────────────────
  function RewardModal({rid,onClose}){
    const ICONS=['📺','🎮','🍕','🍦','🎡','🌙','📚','🎨','🏊','🎠','🍿','🎁','🎪','🚴','⚽'];
    const ex=rid?data.rewards.find(r=>r.id===rid):null;
    const [text,setText]=useState(ex?.text||'');
    const [cost,setCost]=useState(ex?.cost||50);
    const [icon,setIcon]=useState(ex?.icon||'🎁');
    const save=()=>{
      if(!text.trim())return;
      if(rid){upd(p=>({...p,rewards:p.rewards.map(r=>r.id===rid?{...r,text:text.trim(),cost:Number(cost),icon}:r)}));}
      else{upd(p=>({...p,rewards:[...p.rewards,{id:uuid(),text:text.trim(),cost:Number(cost),icon}]}));}
      onClose();
    };
    return(
      <Modal title={rid?'Rediger belønning':'Tilføj belønning'} onClose={onClose} narrow>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <label style={s.label}>Belønning</label>
          <input style={s.input} value={text} onChange={e=>setText(e.target.value)} placeholder="f.eks. 30 min skærmtid" autoFocus/>
          <label style={s.label}>Point-pris</label>
          <input type="number" style={s.input} value={cost} onChange={e=>setCost(e.target.value)} min="1"/>
          <label style={s.label}>Ikon</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {ICONS.map(ic=>(<button key={ic} onClick={()=>setIcon(ic)} style={{fontSize:24,padding:8,borderRadius:10,border:`2px solid ${icon===ic?'var(--rt-primary)':'var(--rt-input-border)'}`,background:icon===ic?'var(--rt-sep)':'var(--rt-card)',cursor:'pointer',touchAction:'manipulation',color:'inherit'}}>{ic}</button>))}
          </div>
          <button onClick={save} style={{...s.btn,background:'var(--rt-primary)',color:'var(--rt-primary-text)',padding:'13px',marginTop:4}}>{rid?'Gem ændringer':'Tilføj belønning'}</button>
        </div>
      </Modal>
    );
  }

  // ── Main render ────────────────────────────────────────────────────────────
  const NAV=[
    {id:'home',icon:'🏠',label:'Hjem'},
    {id:'shop',icon:'🛍',label:'Butik'},
    {id:'weekly',icon:'📊',label:'Uge'},
    {id:'parent',icon:'🔒',label:'Pædagog'},
  ];

  const headerTitle={
    home:'🌟 Ruti',
    child:child?`${child.avatar} ${child.name}`:'Rutiner',
    shop:'🛍 Butik',
    weekly:'📊 Ugentlig oversigt',
    parent:unlocked?'⚙️ Pædagog-panel':'🔒 Pædagog',
  }[view]||'Ruti';

  const showNav=!['child'].includes(view);

  return (
    <div style={s.app}>
      {confetti&&<Confetti/>}

      {/* ── Header ── */}
      <div style={{background:'var(--rt-header)',padding:'12px 16px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 2px 8px rgba(0,0,0,0.12)',flexShrink:0,minHeight:54}}>
        {view==='child'&&(
          <button onClick={()=>setView('home')} style={{...s.btn,background:'rgba(255,255,255,0.25)',color:'#fff',padding:'6px 12px',fontSize:14,borderRadius:10}}>← Hjem</button>
        )}
        <span style={{flex:1,fontSize:20,fontWeight:800,color:'#fff',letterSpacing:-0.5}}>{headerTitle}</span>
        {view==='child'&&child&&(
          <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.22)',borderRadius:20,padding:'4px 12px'}}>
            <span style={{fontSize:18}}>⭐</span>
            <span style={{color:'#fff',fontWeight:800,fontSize:16}}>{child.points||0}</span>
          </div>
        )}
        {view==='home'&&(
          <button onClick={()=>setMAddChild(true)} style={{...s.btn,background:'rgba(255,255,255,0.25)',color:'#fff',padding:'6px 12px',fontSize:14,borderRadius:10}}>+ Barn</button>
        )}
      </div>

      {/* ── Scrollable content ── */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {view==='home'&&<Home/>}
        {view==='child'&&child&&<ChildView/>}
        {view==='shop'&&<Shop/>}
        {view==='weekly'&&<Weekly/>}
        {view==='parent'&&<Parent/>}
      </div>

      {/* ── Bottom nav ── */}
      {showNav&&(
        <div style={{display:'flex',background:'var(--rt-card)',borderTop:'1px solid var(--rt-sep)',flexShrink:0,boxShadow:'0 -2px 8px rgba(0,0,0,0.06)'}}>
          {NAV.map(n=>{
            const active=view===n.id||(n.id==='home'&&view==='child');
            return(
              <button key={n.id} onClick={()=>{if(n.id==='parent'){setView('parent');}else{setView(n.id);}}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 4px 8px',background:'transparent',border:'none',cursor:'pointer',touchAction:'manipulation',transition:'background 0.15s',borderTop:active?`3px solid var(--rt-primary)`:'3px solid transparent'}}>
                <span style={{fontSize:22}}>{n.icon}</span>
                <span style={{fontSize:11,fontWeight:active?700:400,color:active?'var(--rt-primary)':'var(--rt-muted)'}}>{n.label}</span>
              </button>
            );
          })}
        </div>
      )}

      {/* ── Modals ── */}
      {mAddChild&&<ChildModal cid={null} onClose={()=>setMAddChild(false)}/>}
      {mEditChild&&<ChildModal cid={mEditChild} onClose={()=>setMEditChild(null)}/>}
      {mSchedule&&<ScheduleModal cid={mSchedule} onClose={()=>setMSchedule(null)}/>}
      {mAddReward&&<RewardModal rid={null} onClose={()=>setMAddReward(false)}/>}
      {mEditReward&&<RewardModal rid={mEditReward} onClose={()=>setMEditReward(null)}/>}
      {mChangePin&&(
        <Modal title="Skift PIN" onClose={()=>setMChangePin(false)} narrow>
          <PinPad mode="set" onSet={pin=>{upd(p=>({...p,pin}));setMChangePin(false);}}/>
        </Modal>
      )}
      {mTheme&&child&&(
        <Modal title={`${child.avatar} ${child.name} — Tema`} onClose={()=>setMTheme(false)} narrow>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <ThemePicker currentTheme={child.theme||'natur'} onSelect={tid=>{upd(p=>({...p,children:p.children.map(c=>c.id===child.id?{...c,theme:tid}:c)}));setMTheme(false);}}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RutineApp/>);
</script>
</body>
</html>
