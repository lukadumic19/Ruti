// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY='rutine2:data';
const stor={
  get:()=>{try{if(window.storage&&window.storage.get){const v=window.storage.get(STORAGE_KEY);return v?(typeof v==='string'?JSON.parse(v):v):null;}const v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):null;}catch{return null;}},
  set:(d)=>{try{const s=JSON.stringify(d);if(window.storage&&window.storage.set){window.storage.set(STORAGE_KEY,s);}else{localStorage.setItem(STORAGE_KEY,s);}}catch{}}

// ── PinPad ───────────────────────────────────────────────────────────────────
function PinPad({mode='verify',storedPin,onVerify,onSet}){
  const [digits,setDigits]=useState('');
  const [confirm,setConfirm]=useState('');
  const [step,setStep]=useState(1);
  const [err,setErr]=useState('');

  const press=(d)=>{
    setErr('');
    if(d==='del'){step===1?setDigits(p=>p.slice(0,-1)):setConfirm(p=>p.slice(0,-1));return;}
    if(step===1&&digits.length>=4)return;
    if(step===2&&confirm.length>=4)return;
    if(step===1){
      const next=digits+d;
      setDigits(next);
      if(next.length===4){
        if(mode==='verify'){
          if(next===storedPin){setTimeout(()=>onVerify(),200);}
          else{setTimeout(()=>{setErr('Forkert PIN — prøv igen');setDigits('');},300);}
        }else{setStep(2);}
      }
    }else{
      const next=confirm+d;
      setConfirm(next);
      if(next.length===4){
        if(next===digits){setTimeout(()=>onSet(next),200);}
        else{setTimeout(()=>{setErr('PIN-koderne matcher ikke');setDigits('');setConfirm('');setStep(1);},300);}
      }
    }
  };

  const cur=step===1?digits:confirm;
  const prompt=mode==='verify'?'Indtast PIN-kode':step===1?'Vælg ny PIN-kode':'Bekræft ny PIN-kode';
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20,padding:'10px 0'}}>
      <p style={{fontSize:16,fontWeight:600,color:'#555'}}>{prompt}</p>
      <div style={{display:'flex',gap:14}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:'50%',background:cur.length>i?'#FF6B6B':'#e0e0e0',transition:'background 0.15s'}}/>
        ))}
      </div>
      {err&&<p style={{color:'#e74c3c',fontSize:13,textAlign:'center'}}>{err}</p>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:10}}>
        {[1,2,3,4,5,6,7,8,9].map(d=>(
          <button key={d} onClick={()=>press(String(d))} style={{...s.btn,width:72,height:72,fontSize:26,fontWeight:700,background:'#fff',border:'2px solid #eee',borderRadius:16,color:'#2c3e50'}}>{d}</button>
        ))}
        <div/>
        <button onClick={()=>press('0')} style={{...s.btn,width:72,height:72,fontSize:26,fontWeight:700,background:'#fff',border:'2px solid #eee',borderRadius:16,color:'#2c3e50'}}>0</button>

function Modal({children,onClose,title,narrow}){

    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.52)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}>
      <div style={{background:'#fff',borderRadius:24,width:'100%',maxWidth:narrow?390:570,maxHeight:'90vh',overflow:'auto',padding:24,animation:'ruti_fadeIn 0.2s ease-out'}}>

// ── Confetti ─────────────────────────────────────────────────────────────────
function Confetti(){
  const pieces=Array.from({length:65},(_,i)=>({
    id:i,x:Math.random()*100,
    color:['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#FD79A8','#00B894','#FDCB6E'][i%7],
    delay:Math.random()*2,dur:2+Math.random()*2.5,
    size:5+Math.random()*9,shape:Math.random()>0.4?'rect':'circle',
  }));
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:999,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:-15,width:p.size,height:p.size,background:p.color,borderRadius:p.shape==='circle'?'50%':3,animation:`ruti_confetti ${p.dur}s ${p.delay}s ease-in both`}}/>
      ))}
    </div>
  );
}

// ── ProgressBar ───────────────────────────────────────────────────────────────
function ProgressBar({value,max,color='#FF6B6B',height=10}){
  const pct=max>0?Math.min(100,Math.round(value/max*100)):0;
  return(
    <div style={{background:'#f0f0f0',borderRadius:height,height,overflow:'hidden',width:'100%'}}>
      <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:height,transition:'width 0.5s ease'}}/>
    </div>
  );
}

// ── WeeklyChart ───────────────────────────────────────────────────────────────
function WeeklyChart({child}){
  const DAY_NAMES=['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
  const t=new Date();
  const week=Array.from({length:7},(_,i)=>{
    const d=new Date(t);d.setDate(t.getDate()-6+i);
    const key=d.toISOString().slice(0,10);
    const h=child.history.find(x=>x.date===key);
    const dow=d.getDay();
    return{label:DAY_NAMES[dow===0?6:dow-1],pts:h?h.points:0,isToday:key===today()};
  });
  const maxPts=Math.max(...week.map(w=>w.pts),1);
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:6,height:130,padding:'0 4px'}}>
      {week.map((w,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,height:'100%',justifyContent:'flex-end'}}>
          <span style={{fontSize:10,color:w.isToday?child.color:'#aaa',fontWeight:w.isToday?700:400}}>{w.pts>0?w.pts:''}</span>
          <div style={{width:'100%',background:w.isToday?child.color:'#e0e0e0',borderRadius:'6px 6px 0 0',height:`${Math.round(w.pts/maxPts*90)}px`,minHeight:w.pts>0?4:2,transition:'height 0.6s ease'}}/>
          <span style={{fontSize:11,color:w.isToday?child.color:'#aaa',fontWeight:w.isToday?700:400}}>{w.label}</span>
        </div>
      ))}
    </div>
  );
}

  const [mEditReward,setMEditReward]=useState(null);
  const [mChangePin,setMChangePin]=useState(false);

  useEffect(()=>{stor.set(data);},[data]);

  // Midnight reset
  useEffect(()=>{
    const check=()=>{
      const t=today();
      if(data.lastReset!==t){
        setData(prev=>{
          const children=prev.children.map(child=>{
            const earned=Object.values(child.routines).flat().filter(x=>x.done).reduce((a,x)=>a+(x.pointValue||5),0);
            const hist=earned>0?[...child.history.slice(-29),{date:prev.lastReset,points:earned}]:child.history;
            const routines={};
            for(const k of Object.keys(child.routines))routines[k]=child.routines[k].map(x=>({...x,done:false}));
            return{...child,routines,history:hist};
          });
          return{...prev,children,lastReset:t};
        });
      }
    };
    check();
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[data.lastReset]);

  const upd=(fn)=>setData(prev=>fn(prev));
  const child=data.children.find(c=>c.id===childId)||data.children[0]||null;

  const toggleTask=(cid,routine,tid)=>{
    upd(prev=>{
      const children=prev.children.map(c=>{
        if(c.id!==cid)return c;
        const tasks=c.routines[routine].map(t=>t.id===tid?{...t,done:!t.done}:t);
        const toggled=tasks.find(t=>t.id===tid);
        const pts=toggled.pointValue||5;
        const newPts=Math.max(0,c.points+(toggled.done?pts:-pts));
        const newTotal=toggled.done?c.totalPoints+pts:Math.max(0,c.totalPoints-pts);
        const routines={...c.routines,[routine]:tasks};
        if(Object.values(routines).flat().every(t=>t.done))setTimeout(()=>setConfetti(true),100);
        return{...c,routines,points:newPts,totalPoints:newTotal};
      });
      return{...prev,children};
    });
  };

  useEffect(()=>{if(confetti){const t=setTimeout(()=>setConfetti(false),4500);return()=>clearTimeout(t);}},[confetti]);

    return(
      <Modal title={cid?'Rediger barn':'Tilføj barn'} onClose={onClose} narrow>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <label style={s.label}>Navn</label>
          <input style={s.input} value={name} onChange={e=>setName(e.target.value)} placeholder="Barnets navn" autoFocus/>
          <label style={s.label}>Avatar</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {CHILD_AVATARS.map(a=>(
              <button key={a} onClick={()=>setAvatar(a)} style={{fontSize:26,padding:8,borderRadius:10,border:`2px solid ${avatar===a?'#FF6B6B':'#eee'}`,background:avatar===a?'#FFF0EE':'#f8f8f8',cursor:'pointer',touchAction:'manipulation'}}>{a}</button>
            ))}
          </div>
          <label style={s.label}>Farve</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {CHILD_COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{width:30,height:30,borderRadius:'50%',background:c,cursor:'pointer',border:`3px solid ${color===c?'#333':'transparent'}`,transition:'border 0.15s'}}/>
            ))}
          </div>
          <button onClick={save} style={{...s.btn,background:'#FF6B6B',color:'#fff',marginTop:6}}>{cid?'Gem ændringer':'Tilføj barn'}</button>
        </div>
      </Modal>
    );
  }

  function TaskModal({childId,routine,task,onClose}){
    const [text,setText]=useState(task?.text||'');
    const [illus,setIllus]=useState(task?.illustration||'teeth');
    const [pts,setPts]=useState(task?.pointValue||5);
    const save=()=>{
      if(!text.trim())return;
      upd(p=>({...p,children:p.children.map(c=>{
        if(c.id!==childId)return c;
        const tasks=task?c.routines[routine].map(t=>t.id===task.id?{...t,text:text.trim(),illustration:illus,pointValue:Number(pts)}:t):[...c.routines[routine],{id:uuid(),text:text.trim(),illustration:illus,pointValue:Number(pts),done:false}];
        return{...c,routines:{...c.routines,[routine]:tasks}};
      })}));
      onClose();
    };
    return(
      <Modal title={task?'Rediger opgave':'Tilføj opgave'} onClose={onClose}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <label style={s.label}>Opgavenavn</label>
          <input style={s.input} value={text} onChange={e=>setText(e.target.value)} placeholder="f.eks. Børst tænder" autoFocus/>
          <label style={s.label}>Point-værdi</label>
          <div style={{display:'flex',gap:8}}>
            {[5,10,15,20].map(v=>(
              <button key={v} onClick={()=>setPts(v)} style={{...s.btn,flex:1,padding:'8px 0',fontSize:14,background:pts===v?'#FFB347':'#f5f5f5',color:pts===v?'#fff':'#888',border:`2px solid ${pts===v?'#FFB347':'#eee'}`,borderRadius:10}}>{v} ⭐</button>
            ))}
          </div>
          <label style={s.label}>Illustration</label>
          <IllustrationPicker selected={illus} onSelect={setIllus}/>
          <button onClick={save} style={{...s.btn,background:'#FF6B6B',color:'#fff',marginTop:4}}>{task?'Gem ændringer':'Tilføj opgave'}</button>
        </div>
      </Modal>
    );
  }

  function RewardModal({rid,onClose}){
    const ICONS=['📺','🎮','🍕','🍦','🎡','🌙','📚','🎨','🏊','🎠','🍿','🎁','🎪','🚴','⚽'];
    const ex=rid?data.rewards.find(r=>r.id===rid):null;
    const [text,setText]=useState(ex?.text||'');
    const [cost,setCost]=useState(ex?.cost||50);
    const [icon,setIcon]=useState(ex?.icon||'🎁');
    const save=()=>{
      if(!text.trim())return;
      if(rid){upd(p=>({...p,rewards:p.rewards.map(r=>r.id===rid?{...r,text:text.trim(),cost:Number(cost),icon}:r)}));}
      else{upd(p=>({...p,rewards:[...p.rewards,{id:uuid(),text:text.trim(),cost:Number(cost),icon}]}));}
      onClose();
    };
    return(
      <Modal title={rid?'Rediger belønning':'Tilføj belønning'} onClose={onClose} narrow>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <label style={s.label}>Belønning</label>
          <input style={s.input} value={text} onChange={e=>setText(e.target.value)} placeholder="f.eks. 30 min skærmtid" autoFocus/>
          <label style={s.label}>Point-pris</label>
          <input type="number" style={s.input} value={cost} onChange={e=>setCost(e.target.value)} min="1"/>
          <label style={s.label}>Ikon</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setIcon(ic)} style={{fontSize:24,padding:8,borderRadius:10,border:`2px solid ${icon===ic?'#FF6B6B':'#eee'}`,background:icon===ic?'#FFF0EE':'#f8f8f8',cursor:'pointer',touchAction:'manipulation'}}>{ic}</button>
            ))}
          </div>
          <button onClick={save} style={{...s.btn,background:'#FF6B6B',color:'#fff',marginTop:4}}>{rid?'Gem ændringer':'Tilføj belønning'}</button>
        </div>
      </Modal>
    );
  }

  // ── Navigation + render ───────────────────────────────────────────────────
  const NAV=[
    {id:'home',icon:'🏠',label:'Hjem'},
    {id:'shop',icon:'🛍',label:'Butik'},
    {id:'weekly',icon:'📊',label:'Uge'},
    {id:'parent',icon:'🔒',label:'Forældre'},
  ];

  const headerTitle={
    home:'🌟 Ruti',
    child:child?`${child.avatar} ${child.name}`:'Rutiner',
    shop:'🛍 Butik',
    weekly:'📊 Ugentlig oversigt',
    parent:unlocked?'⚙️ Forældre-panel':'🔒 Forældre',
  }[view]||'Ruti';

  return(
    <div style={s.app}>
      {confetti&&<Confetti/>}

      {/* Header */}
      <div style={s.header}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {(view==='child'||view==='shop')&&(
            <button onClick={()=>setView('home')} style={{...s.btn,padding:'6px 12px',background:'rgba(255,255,255,0.22)',color:'#fff',fontSize:18,borderRadius:10}}>←</button>
          )}
          <span style={{fontSize:20,fontWeight:700,letterSpacing:0.5}}>{headerTitle}</span>
        </div>
        {view==='child'&&child&&(
          <span style={{fontSize:15,fontWeight:700,color:'rgba(255,255,255,0.92)'}}>⭐ {child.points}</span>
        )}
      </div>

      {/* Content */}
      <div style={{paddingBottom:76}}>
        {view==='home'&&<Home/>}
        {view==='child'&&<ChildView/>}
        {view==='shop'&&<Shop/>}
        {view==='weekly'&&<Weekly/>}
        {view==='parent'&&<Parent/>}
      </div>

      {/* Bottom nav */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #eee',display:'flex',boxShadow:'0 -2px 14px rgba(0,0,0,0.06)',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}}>
        {NAV.map(n=>{
          const active=view===n.id||(n.id==='home'&&view==='child');
          return(
            <button key={n.id} onClick={()=>{if(n.id==='shop'&&!childId&&data.children[0])setChildId(data.children[0].id);setView(n.id);}} style={{flex:1,border:'none',background:'transparent',padding:'10px 4px 8px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,touchAction:'manipulation',WebkitTapHighlightColor:'transparent'}}>
              <span style={{fontSize:22}}>{n.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:active?'#FF6B6B':'#bbb',textTransform:'uppercase',letterSpacing:0.4}}>{n.label}</span>
              {active&&<div style={{width:5,height:5,borderRadius:'50%',background:'#FF6B6B'}}/>}
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {mAddChild&&<ChildModal onClose={()=>setMAddChild(false)}/>}
      {mEditChild&&<ChildModal cid={mEditChild} onClose={()=>setMEditChild(null)}/>}
      {mAddTask&&<TaskModal childId={mAddTask.childId} routine={mAddTask.routine} onClose={()=>setMAddTask(null)}/>}
      {mEditTask&&<TaskModal childId={mEditTask.childId} routine={mEditTask.routine} task={mEditTask.task} onClose={()=>setMEditTask(null)}/>}
      {mAddReward&&<RewardModal onClose={()=>setMAddReward(false)}/>}
      {mEditReward&&<RewardModal rid={mEditReward} onClose={()=>setMEditReward(null)}/>}
      {mChangePin&&(
        <Modal title="Skift PIN-kode" onClose={()=>setMChangePin(false)} narrow>
          <PinPad mode="set" onSet={pin=>{upd(p=>({...p,pin}));setMChangePin(false);}}/>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RutineApp/>);
</script>
</body>
</html>
