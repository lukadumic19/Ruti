const defaultData=()=>({pin:'1234',lastReset:today(),children:[]});

const migrateData=(raw)=>{
  if(!raw)return defaultData();
  const children=(raw.children||[]).map(c=>{
    let schedule=c.schedule;
    if(!schedule&&c.routines){
      schedule=[...(c.routines.morning||[]),...(c.routines.afternoon||[]),...(c.routines.evening||[])]
        .map(t=>({id:t.id||uuid(),text:t.text,illustration:t.illustration||'morgensamling',time:t.time||null,done:t.done||false}));
    }
    return{
      id:c.id,name:c.name,avatar:c.avatar||'🦁',photo:c.photo||null,
      color:c.color||CHILD_COLORS[0],showTimes:c.showTimes||false,
      reward:c.reward||{enabled:false,text:''},
      schedule:(schedule||[]).map(t=>({id:t.id,text:t.text,illustration:t.illustration||'morgensamling',time:t.time||null,done:t.done||false}))
    };
  });
  return{pin:raw.pin||'1234',lastReset:raw.lastReset||today(),children};
};

// Compress + crop image to max 200×200 JPEG, returns base64 data-URL
function compressImage(file,cb){
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=200;
    const scale=Math.min(MAX/img.width,MAX/img.height,1);
    const w=Math.round(img.width*scale);
    const h=Math.round(img.height*scale);
    const cv=document.createElement('canvas');
    cv.width=w;cv.height=h;
    const ctx=cv.getContext('2d');
    // crop to square from center
    const side=Math.min(img.width,img.height);
    const sx=(img.width-side)/2;
    const sy=(img.height-side)/2;
    ctx.drawImage(img,sx,sy,side,side,0,0,w,h);
    URL.revokeObjectURL(url);
    cb(cv.toDataURL('image/jpeg',0.82));
  };
  img.src=url;
}

function PinPad({mode,storedPin,onVerify,onSet}){
  const [digits,setDigits]=useState('');
  const [confirm,setConfirm]=useState('');
  const [step,setStep]=useState(1);
  const [err,setErr]=useState('');
  const press=(d)=>{
    setErr('');
    if(d==='del'){step===1?setDigits(p=>p.slice(0,-1)):setConfirm(p=>p.slice(0,-1));return;}
    if(step===1&&digits.length>=4)return;
    if(step===2&&confirm.length>=4)return;
    if(step===1){
      const next=digits+d;setDigits(next);
      if(next.length===4){
        if(mode==='verify'){
          if(next===storedPin){setTimeout(()=>onVerify(),200);}
          else{setTimeout(()=>{setErr('Forkert PIN — prøv igen');setDigits('');},300);}
        }else{setStep(2);}
      }
    }else{
      const next=confirm+d;setConfirm(next);
      if(next.length===4){
        if(next===digits){setTimeout(()=>onSet(next),200);}
        else{setTimeout(()=>{setErr('Koderne matcher ikke');setDigits('');setConfirm('');setStep(1);},300);}
      }
    }
  };
  const cur=step===1?digits:confirm;
  const prompt=mode==='verify'?'Indtast PIN-kode':step===1?'Vælg ny PIN':'Bekræft ny PIN';
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <p style={{fontSize:16,fontWeight:600,color:'var(--fl-text)'}}>{prompt}</p>
      <div style={{display:'flex',gap:12}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:'50%',background:cur.length>i?'var(--fl-pin-fill)':'var(--fl-pin-dot)',transition:'background 0.15s'}}/>)}
      </div>
      {err&&<p style={{color:'var(--fl-del-text)',fontSize:13,textAlign:'center'}}>{err}</p>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,68px)',gap:8}}>
        {[1,2,3,4,5,6,7,8,9].map(d=>(
          <button key={d} onClick={()=>press(String(d))} style={{...s.btn,width:68,height:68,fontSize:24,fontWeight:600,background:'var(--fl-pin-btn)',border:'1.5px solid var(--fl-pin-border)',borderRadius:14,color:'var(--fl-text)'}}>{d}</button>
        ))}
        <div/>
        <button onClick={()=>press('0')} style={{...s.btn,width:68,height:68,fontSize:24,fontWeight:600,background:'var(--fl-pin-btn)',border:'1.5px solid var(--fl-pin-border)',borderRadius:14,color:'var(--fl-text)'}}>0</button>
        <button onClick={()=>press('del')} style={{...s.btn,width:68,height:68,fontSize:20,background:'var(--fl-pin-btn)',border:'1.5px solid var(--fl-pin-border)',borderRadius:14,color:'var(--fl-del-text)'}}>⌫</button>
      </div>
    </div>
  );
}

                <div style={{flex:1}}>
                  <div style={{fontSize:17,fontWeight:700,color:'#2D3142'}}>{task.text}</div>
                  <div style={{display:'flex',gap:10,marginTop:3,flexWrap:'wrap'}}>

  // ── Schedule modal ────────────────────────────────────────────────────────
  function ScheduleModal({cid,onClose}){
    const c=data.children.find(x=>x.id===cid);
    if(!c)return null;
    const schedule=c.schedule||[];
    const [dragSrc,setDragSrc]=useState(null);
    const [dragOver,setDragOver]=useState(null);
    const [showBank,setShowBank]=useState(false);
    const [editing,setEditing]=useState(null);
    const updSched=(ns)=>upd(p=>({...p,children:p.children.map(ch=>ch.id!==cid?ch:{...ch,schedule:ns})}));
    const move=(idx,dir)=>{const ni=idx+dir;if(ni<0||ni>=schedule.length)return;const a=[...schedule];[a[idx],a[ni]]=[a[ni],a[idx]];updSched(a);};
    const addFromBank=(preset)=>updSched([...schedule,{id:uuid(),text:preset.text,illustration:preset.illustration,time:c.showTimes?(preset.defaultTime||null):null,done:false}]);
    if(editing!==null){
      const task=editing==='new'?null:editing;
      return<ActivityForm task={task} cid={cid} schedule={schedule} updSched={updSched} showTime={c.showTimes} onDone={()=>setEditing(null)} onClose={onClose}/>;
    }
    return(
      <Modal title={`${c.name} — Dagsplan`} onClose={onClose}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'var(--fl-sep)',borderRadius:12}}>
            <div>
              <div style={{fontWeight:600,color:'var(--fl-text)',fontSize:14}}>Vis klokkeslæt</div>
              <div style={{fontSize:11,color:'var(--fl-muted)',marginTop:2}}>Tidspunkter vises på barnets skærm</div>
            </div>
            <Toggle on={c.showTimes} onToggle={()=>upd(p=>({...p,children:p.children.map(ch=>ch.id!==cid?ch:{...ch,showTimes:!ch.showTimes})}))}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {schedule.length===0&&<p style={{textAlign:'center',color:'var(--fl-muted)',padding:'16px 0',fontSize:14}}>Tilføj aktiviteter fra billedbanken nedenfor</p>}
            {schedule.map((act,idx)=>(
              <div key={act.id} draggable
                onDragStart={()=>setDragSrc(idx)}
                onDragOver={e=>{e.preventDefault();setDragOver(idx);}}
                onDrop={e=>{e.preventDefault();if(dragSrc===null||dragSrc===idx){setDragSrc(null);setDragOver(null);return;}const a=[...schedule];const[m]=a.splice(dragSrc,1);a.splice(idx,0,m);updSched(a);setDragSrc(null);setDragOver(null);}}
                onDragEnd={()=>{setDragSrc(null);setDragOver(null);}}
                style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,background:dragOver===idx?'var(--fl-sep)':'var(--fl-card)',border:'1px solid var(--fl-sep)',opacity:act.done?0.55:1,cursor:'grab'}}>
                <div style={{color:'var(--fl-faint)',fontSize:16,flexShrink:0,cursor:'grab'}}>⠿</div>
                {taskIl(act,34)}
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--fl-text)'}}>{act.text}</div>
                  {act.time&&<div style={{fontSize:11,color:'var(--fl-muted)'}}>⏰ {act.time}</div>}
                </div>
                {act.done&&<span style={{fontSize:12,color:'var(--fl-done)',fontWeight:700,flexShrink:0}}>✓</span>}
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button onClick={()=>move(idx,-1)} disabled={idx===0} style={{...s.btn,padding:'4px 8px',fontSize:14,background:'var(--fl-sep)',color:idx===0?'var(--fl-faint)':'var(--fl-muted)',borderRadius:8}}>↑</button>
                  <button onClick={()=>move(idx,1)} disabled={idx===schedule.length-1} style={{...s.btn,padding:'4px 8px',fontSize:14,background:'var(--fl-sep)',color:idx===schedule.length-1?'var(--fl-faint)':'var(--fl-muted)',borderRadius:8}}>↓</button>
                </div>
                <button onClick={()=>setEditing(act)} style={{...s.btn,padding:'5px 8px',background:'var(--fl-sep)',color:'var(--fl-muted)',borderRadius:8}} title="Rediger">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button onClick={()=>updSched(schedule.filter(t=>t.id!==act.id))} style={{...s.btn,padding:'5px 8px',background:'var(--fl-del-bg)',color:'var(--fl-del-text)',borderRadius:8}} title="Slet">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowBank(p=>!p)} style={{...s.btn,flex:1,padding:'11px',fontSize:14,background:'var(--fl-primary)',color:'var(--fl-primary-text)',borderRadius:12}}>{showBank?'Skjul billedbank':'Billedbank'}</button>
            <button onClick={()=>setEditing('new')} style={{...s.btn,padding:'11px 18px',fontSize:14,background:'var(--fl-sep)',color:'var(--fl-muted)',borderRadius:12}}>+ Ny</button>
            {schedule.some(t=>t.done)&&<button onClick={()=>{if(window.confirm('Nulstil dagens afkrydsninger?'))updSched(schedule.map(t=>({...t,done:false})));}} style={{...s.btn,padding:'11px 14px',fontSize:13,background:'var(--fl-del-bg)',color:'var(--fl-del-text)',borderRadius:12}}>Nulstil</button>}
          </div>
          {showBank&&(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <p style={{fontSize:12,color:'var(--fl-muted)',paddingLeft:2}}>Tryk på en aktivitet for at tilføje den</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                {ACTIVITY_BANK.map((a,i)=>(
                  <button key={i} onClick={()=>addFromBank(a)} style={{...s.btn,flexDirection:'column',gap:8,padding:'14px 8px',background:'var(--fl-sep)',color:'var(--fl-text)',borderRadius:14,fontSize:12,fontWeight:600,lineHeight:1.3,textAlign:'center',minHeight:90}}>
                    {ilGet(a.illustration,52)}
                    <span style={{wordBreak:'break-word',maxWidth:'100%'}}>{a.text}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </Modal>
    );
  }

  // ── Activity form ─────────────────────────────────────────────────────────
  function ActivityForm({task,cid,schedule,updSched,showTime,onDone,onClose}){
    const [text,setText]=useState(task?.text||'');
    const [illus,setIllus]=useState(task?.illustration||'morgensamling');
    const [customImg,setCustomImg]=useState(task?.customImage||task?.photo||null);
    const [time,setTime]=useState(task?.time||'');
    const [duration,setDuration]=useState(task?.duration||'');
    const fileRef=React.useRef();
    const onFile=e=>{const f=e.target.files?.[0];if(f)compressImage(f,d=>setCustomImg(d));e.target.value='';};
    const save=()=>{
      if(!text.trim())return;
      const item={id:task?.id||uuid(),text:text.trim(),illustration:illus,customImage:customImg||null,time:time||null,duration:duration?Number(duration):null,done:task?.done||false};
      if(task){updSched(schedule.map(t=>t.id===task.id?item:t));}else{updSched([...schedule,item]);}
      onDone();
    };
    return(
      <Modal title={task?'Rediger aktivitet':'Ny aktivitet'} onClose={onClose}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <button onClick={onDone} style={{...s.btn,padding:'6px 14px',fontSize:13,background:'var(--fl-sep)',color:'var(--fl-muted)',borderRadius:10,alignSelf:'flex-start'}}>← Tilbage</button>
          <label style={s.label}>Navn</label>
          <input style={s.input} value={text} onChange={e=>setText(e.target.value)} placeholder="f.eks. Udeleg" autoFocus/>
          {showTime&&(<>
            <label style={s.label}>Klokkeslæt (valgfrit)</label>
            <input type="time" style={s.input} value={time} onChange={e=>setTime(e.target.value)}/>
          </>)}
          <label style={s.label}>Varighed i minutter (valgfrit)</label>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="number" min="1" max="240" style={{...s.input,width:100}} value={duration} onChange={e=>setDuration(e.target.value)} placeholder="–"/>
            <div style={{display:'flex',gap:6}}>
              {[5,10,15,20,30,45,60].map(v=>(
                <button key={v} onClick={()=>setDuration(String(v))} style={{...s.btn,padding:'8px 10px',fontSize:13,background:Number(duration)===v?'var(--fl-primary)':'var(--fl-sep)',color:Number(duration)===v?'#fff':'var(--fl-muted)',borderRadius:8}}>{v}</button>
              ))}
            </div>
          </div>
          <label style={s.label}>Eget billede</label>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div onClick={()=>fileRef.current.click()} style={{width:64,height:64,borderRadius:16,overflow:'hidden',background:'var(--fl-sep)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,border:'2px dashed var(--fl-input-border)',position:'relative'}}>
              {customImg
                ?<img src={customImg} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                :ilGet(illus,44)}
              <div style={{position:'absolute',bottom:0,right:0,width:20,height:20,borderRadius:'50%',background:'var(--fl-primary)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,flex:1}}>
              <button type="button" onClick={()=>fileRef.current.click()} style={{...s.btn,padding:'9px 14px',fontSize:13,background:'var(--fl-primary)',color:'#fff',borderRadius:10}}>Vælg billede / kamera</button>
              {customImg&&<button type="button" onClick={()=>setCustomImg(null)} style={{...s.btn,padding:'7px 14px',fontSize:12,background:'var(--fl-del-bg)',color:'var(--fl-del-text)',borderRadius:10}}>Fjern billede</button>}
            </div>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
          <label style={s.label}>Illustration (bruges hvis intet foto)</label>
          <IllustrationPicker selected={illus} onSelect={setIllus}/>
          <button onClick={save} style={{...s.btn,background:'var(--fl-primary)',color:'var(--fl-primary-text)',padding:'13px',marginTop:4,fontSize:16,borderRadius:12}}>{task?'Gem ændringer':'Tilføj aktivitet'}</button>
        </div>
      </Modal>
    );
  }

  // ── Child modal ───────────────────────────────────────────────────────────

            ))}
          </div>
          <label style={s.label}>Belønning</label>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'var(--fl-sep)',borderRadius:12}}>
            <div>
              <div style={{fontWeight:600,color:'var(--fl-text)',fontSize:14}}>Belønning aktiv</div>
              <div style={{fontSize:11,color:'var(--fl-muted)',marginTop:2}}>Fremgang vises på barnets skærm</div>
            </div>
            <Toggle on={rewardEnabled} onToggle={()=>setRewardEnabled(p=>!p)}/>
          </div>
          {rewardEnabled&&(<>
            <label style={s.label}>Hvad er belønningen?</label>
            <input style={s.input} value={rewardText} onChange={e=>setRewardText(e.target.value)} placeholder="f.eks. 30 min. fri leg"/>
          </>)}
          <button onClick={save} style={{...s.btn,background:'var(--fl-primary)',color:'var(--fl-primary-text)',marginTop:4,padding:'13px',borderRadius:12}}>{cid?'Gem ændringer':'Tilføj barn'}</button>
        </div>
      </Modal>
    );
  }
  // ── Nav icons ────────���────────────────────────────────────────────────────
  const IconHome=({active})=>(
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'var(--fl-primary)':'var(--fl-faint)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
  );
  const IconLock=({active})=>(
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'var(--fl-primary)':'var(--fl-faint)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
  );

  const isChild=view==='child';

  return(
    <div style={s.app}>
      {/* ── Header ── educator: white; child: child color */}
      {isChild?(
        <div style={{background:child?.color||'#4A8FE7',paddingTop:'calc(16px + env(safe-area-inset-top))',paddingBottom:16,paddingLeft:18,paddingRight:18,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <button onClick={()=>setView('home')} style={{...s.btn,background:'rgba(255,255,255,0.22)',color:'#fff',padding:'8px 14px',fontSize:15,borderRadius:24,fontWeight:700}}>←</button>
          <Avatar child={child} size={32} style={{border:'2px solid rgba(255,255,255,0.5)',borderRadius:'50%'}}/>
          <span style={{flex:1,fontSize:19,fontWeight:800,color:'#fff',letterSpacing:-0.3}}>{child?.name}</span>
        </div>
      ):(
        <div style={{background:'#FFFFFF',paddingTop:'calc(14px + env(safe-area-inset-top))',paddingBottom:14,paddingLeft:20,paddingRight:20,display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--fl-sep)',flexShrink:0}}>
          <span style={{flex:1,fontSize:21,fontWeight:800,color:'var(--fl-primary)',letterSpacing:-0.5}}>Flow</span>
          {view==='parent'&&unlocked&&<span style={{fontSize:13,color:'var(--fl-muted)',fontWeight:500}}>Pædagogens panel</span>}
          {view==='parent'&&!unlocked&&<span style={{fontSize:13,color:'var(--fl-muted)',fontWeight:500}}>Pædagog</span>}
        </div>
      )}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {view==='home'&&<HomeView/>}
        {view==='child'&&child&&<ChildView/>}
        {view==='parent'&&<ParentView/>}
      </div>
      {!isChild&&(
        <div style={{display:'flex',background:'var(--fl-card)',borderTop:'1px solid var(--fl-sep)',flexShrink:0,boxShadow:'0 -1px 6px rgba(44,53,80,0.06)',paddingBottom:'env(safe-area-inset-bottom)'}}>
          {[{id:'home',label:'Hjem',Icon:IconHome},{id:'parent',label:'Pædagog',Icon:IconLock}].map(n=>{
            const active=view===n.id;
            return(
              <button key={n.id} onClick={()=>setView(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 4px 8px',background:'transparent',border:'none',cursor:'pointer',touchAction:'manipulation',borderTop:active?'2px solid var(--fl-primary)':'2px solid transparent'}}>
                <n.Icon active={active}/>
                <span style={{fontSize:11,fontWeight:active?700:400,color:active?'var(--fl-primary)':'var(--fl-muted)'}}>{n.label}</span>
              </button>
            );
          })}
        </div>
      )}
      {mAddChild&&<ChildModal cid={null} onClose={()=>setMAddChild(false)}/>}
      {mEditChild&&<ChildModal cid={mEditChild} onClose={()=>setMEditChild(null)}/>}
      {mSchedule&&<ScheduleModal cid={mSchedule} onClose={()=>setMSchedule(null)}/>}
      {mChangePin&&(
        <Modal title="Skift PIN" onClose={()=>setMChangePin(false)} narrow>
          <div style={{display:'flex',justifyContent:'center',paddingTop:8}}>
            <PinPad mode="set" onSet={pin=>{upd(p=>({...p,pin}));setMChangePin(false);}}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FlowApp/>);
</script>
</body>
</html>
